name: CI

on:
  push:
  pull_request:

jobs:

  # ── Test ──────────────────────────────────────────────────────────────────
  # Runs on every push and pull request.

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show   # installs toolchain pinned in rust-toolchain.toml
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # ── Build ─────────────────────────────────────────────────────────────────
  # Verifies the release binary compiles on every push.
  # Produces the binary as a downloadable artifact (kept 7 days).

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show   # installs toolchain pinned in rust-toolchain.toml
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: wlrigctl-${{ github.sha }}
          path: target/release/wlrigctl
          retention-days: 7

  # ── Package ───────────────────────────────────────────────────────────────
  # Runs only when a semver tag is pushed (v0.4.0, v1.2.3, …).
  # Reuses the release binary from the build job to avoid compiling twice.
  # Produces a .deb and attaches it to a GitHub Release.
  #
  # To release:
  #   1. Bump version in Cargo.toml and commit
  #   2. git tag v<version> && git push origin v<version>
  # CI will fail fast if the tag and Cargo.toml version don't match.

  package:
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a GitHub Release
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO}"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          name: wlrigctl-${{ github.sha }}
          path: target/release/
      - run: chmod +x target/release/wlrigctl
      - uses: actions/cache@v4
        id: cache-cargo-deb
        with:
          path: ~/.cargo/bin/cargo-deb
          key: cargo-deb-${{ runner.os }}
      - if: steps.cache-cargo-deb.outputs.cache-hit != 'true'
        run: rustup show && cargo install --locked cargo-deb
      - run: cargo deb --no-build
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            target/debian/*.deb
