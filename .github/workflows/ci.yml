name: CI

on:
  push:
  pull_request:

jobs:

  # ── Test ──────────────────────────────────────────────────────────────────
  # Runs on every push and pull request.

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # ── Build ─────────────────────────────────────────────────────────────────
  # Verifies the release binary compiles on every push.
  # Produces the binary as a downloadable artifact (kept 7 days).

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: wlrigctl-${{ github.sha }}
          path: target/release/wlrigctl
          retention-days: 7

  # ── Package ───────────────────────────────────────────────────────────────
  # Runs only when a semver tag is pushed (v0.4.0, v1.2.3, …).
  # Builds the .deb and attaches it to a GitHub Release.
  #
  # Use cargo-release to cut a release — it keeps the tag and Cargo.toml
  # version in sync automatically:
  #   cargo release 0.5.0

  package:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO}"
            exit 1
          fi
      - run: cargo build --release
      - run: cargo install cargo-deb
      - run: cargo deb --no-build
      - uses: softprops/action-gh-release@v1
        with:
          files: target/debian/*.deb
