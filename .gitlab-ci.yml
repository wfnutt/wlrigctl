stages:
  - test
  - build
  - package

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  GIT_DEPTH: "2"

.cargo-cache:
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/
      - .cargo/git/
      - .cargo/bin/
      - target/

# ── Stage: test ────────────────────────────────────────────────────────────

test:
  stage: test
  image: rust:1-bookworm
  extends: .cargo-cache
  script:
    - cargo clippy -- -D warnings
    - cargo test

# ── Stage: build ───────────────────────────────────────────────────────────

build:
  stage: build
  image: rust:1-bookworm
  extends: .cargo-cache
  needs:
    - test
  script:
    - cargo build --release
  artifacts:
    name: "wlrigctl-${CI_COMMIT_SHORT_SHA}"
    paths:
      - target/release/wlrigctl
    expire_in: 1 week

# ── Stage: package ─────────────────────────────────────────────────────────
# Runs only when a semver tag (v0.4.0, v1.2.3, …) is pushed.
# Tag your release commit: git tag v0.4.0 && git push origin v0.4.0

package:
  stage: package
  image: rust:1-bookworm
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/
      - .cargo/git/
      - .cargo/bin/
      - target/
    policy: pull
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
  script:
    - cargo install cargo-deb
    - cargo deb --no-build
  artifacts:
    name: "wlrigctl_${CI_COMMIT_TAG}"
    paths:
      - target/debian/*.deb
    expire_in: 1 month
