# This is an example config file. Please edit it to your needs
# and place it, for example, in your `$HOME/.config/wlrigctl/config.toml`

# Used to push data from flrig towards wavelog
[wavelog]
# Note: URL should end with "/index.php/api/radio".
url = "http://localhost/index.php/api/radio"
qso_url = "http://localhost/api/qso"
key = "wlxxxxxxxxxxxxx"
identifier = "my-radio-model"

# This is an index used by wavelog to discriminate between multiple station
# descriptions. Most users will need 1 here.
station_profile_id = 1
# interval is in milliseconds
interval = 1000

# When set, wlrigctl includes this URL in every live-radio POST so Wavelog can
# auto-register the CAT callback.  Set it to the address of wlrigctl's CAT
# server (127.0.0.1 and the [CAT] port below).  Wavelog must be able to reach this URL
# from the machine running the browser.
# cat_url = "http://127.0.0.1:54321"



# Used to retrieve data from the radio, to supply live VFO freq to QSO window
[flrig]
# Note: Do not forget the "http://".
host = "http://127.0.0.1"
port = 12345

# In Watts; needed to scale 0-100 from FLRig into Watts for Wavelog QSO
# It would be nice if we could reliably query all radios for max. power, but...
maxpower = "10"

# on IC-703, set_bandwidth() with index 1 selects narrow 250Hz filter for CW
# (if fitted...)
cwbandwidth = 1



# This is the reverse direction from wavelog, when a user clicks a callsign on
# the bandmap and we want to qsy to that frequency.
# The CAT server always binds to 127.0.0.1 (loopback only).
[CAT]
port = 54321

# FLRig mode strings for this rig.  All three default to ICOM/generic names
# (CW, RTTY, D-USB) if absent, so IC-703 users need not set anything here.
#
# Uncomment and adjust for your rig:
#
#   Yaesu FTDX10 / FT-991A etc.:
# cw_mode      = "CW-U"
# rtty_mode    = "RTTY-U"
# digital_mode = "DATA-U"
#
#   Kenwood (RTTY reported as FSK):
# rtty_mode    = "FSK"
#
#   Newer ICOM (IC-7300, IC-7610 etc.):
# digital_mode = "USB-D"
#
#   Elecraft (generic DATA mode):
# digital_mode = "DATA"

# FT8 dial frequencies in Hz. When present this list replaces the built-in
# defaults so you can update the band plan without recompiling.
# The default list (used when this key is absent) is:
#   160m 1840000 / 80m 3575000 / 40m 7074000 / 30m 10136000 / 20m 14074000
#   17m 18100000 / 15m 21074000 / 12m 24915000 / 10m 28074000 / 6m 50313000
# To override, uncomment and edit:
# ft8_frequencies = [1840000, 3575000, 7074000, 10136000, 14074000, 18100000, 21074000, 24915000, 28074000, 50313000]


# WebSocket server — on by default, no configuration required.
#
# wlrigctl listens on wss://127.0.0.1:54323/ and pushes live rig state to
# Wavelog's built-in WebSocket consumer (the same port WaveLogGate uses).
# A self-signed TLS certificate is generated automatically on first startup
# and saved to ~/.config/wlrigctl/ws-cert.pem so it persists across restarts.
#
# IMPORTANT — Chrome users: Chrome does not permanently remember the
# "Proceed" exception for self-signed certificates.  The bypass expires
# when the browser restarts, so you will be asked again every session.
# Use mkcert (below) to fix this permanently.
#
# Firefox users: the exception is stored permanently on disk.  You will
# only need to do the setup step once.
#
# One-time browser setup (Firefox, or Chrome before mkcert is installed):
#   Visit https://127.0.0.1:54323/ in the browser, click Advanced →
#   "Proceed to 127.0.0.1 (unsafe)".  After that Wavelog connects silently.
#
# Permanent fix for Chrome (and cleaner for Firefox too) — use mkcert:
#
#   mkcert -install   # run once; installs a trusted CA into browser trust stores
#   mkcert -cert-file ~/.config/wlrigctl/ws-cert.pem \
#          -key-file  ~/.config/wlrigctl/ws-key.pem \
#          127.0.0.1 localhost
#   # then set tls_cert and tls_key below and restart wlrigctl
#   # You will never see a certificate warning again.
#
# Override any of the defaults by adding a [websocket] section:
#
# [websocket]
# host = "127.0.0.1"
# port = 54323
# tls_cert = "/home/yourname/.config/wlrigctl/ws-cert.pem"
# tls_key  = "/home/yourname/.config/wlrigctl/ws-key.pem"



# For capturing QSO ADIF from WSJT-X
[WSJTX]
host = "127.0.0.1"
port = 2237

# error timeout in seconds
err_timeout = 3
